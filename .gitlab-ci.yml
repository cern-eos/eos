# Root pipeline definition. All concrete jobs live in topic-specific files
# pulled in via `include:` below. Shared infrastructure (stages, defaults,
# workflow rules, reusable rule fragments) stays here.

stages:
  - build:manual
  - pre-commit
  - prebuild
  - build:rpm
  - build:dockerimage
  - test
  - publish
  - clean

variables:
  CODENAME: "diopside"
  GIT_SUBMODULE_STRATEGY: recursive
  GIT_SUBMODULE_DEPTH: 1
  GIT_SUBMODULE_UPDATE_FLAGS: --jobs 8
  CCACHE_POLICY: pull-push
  FF_USE_FASTZIP: "true"
  CACHE_COMPRESSION_LEVEL: fastest
  ARTIFACT_COMPRESSION_LEVEL: fastest
  # RPM payload codec for dev builds: zstd-3 is much faster than the default xz
  # for a marginally larger package. Cleared for tag builds (see workflow rules)
  # so published release RPMs keep the smaller default compression.
  RPM_BINARY_PAYLOAD: "w3.zstdio"

default:
  interruptible: true
  image: gitlab-registry.cern.ch/linuxsupport/alma9-base
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

workflow:
  auto_cancel:
    on_new_commit: interruptible

  rules:
    # Scheduled pipelines always run (don't evaluate file changes for them)
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      variables:
        KOJI_SCRATCH: "--scratch"
    # Tag pipelines always run
    - if: '$CI_COMMIT_TAG'
      variables:
        KOJI_SCRATCH: ""
        CCACHE_POLICY: push
        RPM_BINARY_PAYLOAD: ""
    # Merge request pipelines
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      variables:
        KOJI_SCRATCH: "--scratch"
    # Avoid duplicate pipelines: if an MR is open for this branch the MR
    # pipeline (rule above) already covers it, so skip the branch pipeline.
    - if: '$CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS'
      when: never
    # Master branch: always run. We can't use `changes: compare_to: master` here
    # because comparing master against itself produces an empty diff that never
    # matches, so no rule would apply and GitLab would refuse to create the
    # pipeline.
    - if: '$CI_COMMIT_BRANCH == "master"'
      variables:
        KOJI_SCRATCH: "--scratch"
    # Other branches: skip if only docs/ changed compared to master
    - if: '$CI_COMMIT_BRANCH'
      changes:
        compare_to: 'refs/heads/master'
        paths:
          - '**/*'
          - '!docs/**/*'
      variables:
        #KOJI_SCRATCH: "--scratch --skip-tag"
        KOJI_SCRATCH: "--scratch"

#-------------------------------------------------------------------------------
# Shared rule fragments
# Pull these into a job via:  rules: !reference [.rules-..., rules]
#-------------------------------------------------------------------------------
.rules-schedules-and-tags:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_COMMIT_TAG'

# build_el9 is the primary platform: unlike el8/el10 (schedule + tag only) it
# runs on every pipeline, starts without waiting on earlier stages (needs: []),
# and only pulls the ccache on scheduled runs so it does not repopulate it.
.rules-build-el9:
  rules:
    - if: '$PREBUILD_TRIGGER'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      variables:
        CCACHE_POLICY: pull
      needs: []
    - when: on_success
      needs: []

.rules-schedules-and-triggers:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "trigger"'

.rules-tags-only:
  rules:
    - if: '$CI_COMMIT_TAG'

.rules-manual-on-schedule:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: manual
      allow_failure: true

.rules-manual:
  rules:
    - when: manual
      allow_failure: true

.rules-schedules-and-tags-manual:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: manual
      allow_failure: true
    - if: '$CI_COMMIT_TAG'
      when: manual
      allow_failure: true

.rules-master-and-tags:
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_COMMIT_TAG'

.rules-tags-manual:
  rules:
    - if: '$CI_COMMIT_TAG'
      when: manual
      allow_failure: true

#-------------------------------------------------------------------------------
# Concrete jobs are split by topic. Hidden templates (.foo) and rule fragments
# defined above are visible across all includes thanks to GitLab merging all
# files into one virtual configuration before evaluation.
#-------------------------------------------------------------------------------
include:
  # - template: Code-Quality.gitlab-ci.yml
  #  - local: /gitlab-ci/.gitlab-ci-test-dock_include.yml @note on the file
  #  - local: /gitlab-ci/.gitlab-ci-build-macos.yml
  - local: /gitlab-ci/.gitlab-ci-prebuild.yml
  - local: /gitlab-ci/.gitlab-ci-build-rhel.yml
  - local: /gitlab-ci/.gitlab-ci-build-ubuntu.yml
  - local: /gitlab-ci/.gitlab-ci-build-dockerimage.yml
  - local: /gitlab-ci/.gitlab-ci-test-unit.yml
  - local: /gitlab-ci/.gitlab-ci-test-dock8s.yml
  - local: /gitlab-ci/.gitlab-ci-test-k8s_include.yml
  - local: /gitlab-ci/.gitlab-ci-test-helm_include.yml
  - local: /gitlab-ci/.gitlab-ci-test-triggers.yml
  - local: /gitlab-ci/.gitlab-ci-publish.yml
  - local: /gitlab-ci/.gitlab-ci-clean.yml
  - local: /gitlab-ci/.gitlab-ci-misc.yml
