# Root pipeline definition. All concrete jobs live in topic-specific files
# pulled in via `include:` below. Shared infrastructure (stages, defaults,
# workflow rules, reusable rule fragments) stays here.

stages:
  - build:manual
  - pre-commit
  - prebuild
  - build:rpm
  - build:dockerimage
  - test
  - publish
  - clean

variables:
  CODENAME: "diopside"
  GIT_SUBMODULE_STRATEGY: recursive
  GIT_SUBMODULE_DEPTH: 1

default:
  interruptible: true
  image: gitlab-registry.cern.ch/linuxsupport/alma9-base
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

workflow:
  auto_cancel:
    on_new_commit: interruptible

  rules:
    # Scheduled pipelines always run (don't evaluate file changes for them)
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      variables:
        KOJI_SCRATCH: "--scratch"
    # Tag pipelines always run
    - if: '$CI_COMMIT_TAG'
      variables:
        KOJI_SCRATCH: ""
    # Branch pipelines: skip if only docs/ changed compared to master
    - if: '$CI_COMMIT_BRANCH'
      changes:
        compare_to: 'refs/heads/master'
        paths:
          - '**/*'
          - '!docs/**/*'
      variables:
        #KOJI_SCRATCH: "--scratch --skip-tag"
        KOJI_SCRATCH: "--scratch"

#-------------------------------------------------------------------------------
# Shared rule fragments
# Pull these into a job via:  rules: !reference [.rules-..., rules]
#-------------------------------------------------------------------------------
.rules-schedules-and-tags:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_COMMIT_TAG'

.rules-schedules-and-triggers:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "trigger"'

.rules-tags-only:
  rules:
    - if: '$CI_COMMIT_TAG'

.rules-except-tags-manual:
  rules:
    - if: '$CI_COMMIT_TAG'
      when: never
    - when: manual
      allow_failure: true

.rules-manual-on-schedule:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: manual
      allow_failure: true

.rules-manual:
  rules:
    - when: manual
      allow_failure: true

.rules-schedules-and-tags-manual:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: manual
      allow_failure: true
    - if: '$CI_COMMIT_TAG'
      when: manual
      allow_failure: true

.rules-master-and-tags:
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_COMMIT_TAG'

.rules-tags-manual:
  rules:
    - if: '$CI_COMMIT_TAG'
      when: manual
      allow_failure: true

#-------------------------------------------------------------------------------
# Concrete jobs are split by topic. Hidden templates (.foo) and rule fragments
# defined above are visible across all includes thanks to GitLab merging all
# files into one virtual configuration before evaluation.
#-------------------------------------------------------------------------------
include:
  # - template: Code-Quality.gitlab-ci.yml
  #  - local: /gitlab-ci/.gitlab-ci-test-dock_include.yml @note on the file
  #  - local: /gitlab-ci/.gitlab-ci-build-macos.yml
  - local: /gitlab-ci/.gitlab-ci-prebuild.yml
  - local: /gitlab-ci/.gitlab-ci-build-rhel.yml
  - local: /gitlab-ci/.gitlab-ci-build-ubuntu.yml
  - local: /gitlab-ci/.gitlab-ci-build-dockerimage.yml
  - local: /gitlab-ci/.gitlab-ci-test-unit.yml
  - local: /gitlab-ci/.gitlab-ci-test-dock8s.yml
  - local: /gitlab-ci/.gitlab-ci-test-k8s_include.yml
  - local: /gitlab-ci/.gitlab-ci-test-helm_include.yml
  - local: /gitlab-ci/.gitlab-ci-publish.yml
  - local: /gitlab-ci/.gitlab-ci-clean.yml
  - local: /gitlab-ci/.gitlab-ci-misc.yml
