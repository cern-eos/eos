# Publishing: Koji builds, storage-ci RPM publishing, email notification,
# CTA pipeline trigger, and the post-publish docker image push.

#-------------------------------------------------------------------------------
# Koji
#-------------------------------------------------------------------------------

.publish_koji_template:
  stage: publish
  image: gitlab-registry.cern.ch/linuxsupport/rpmci/kojicli
  script:
    - dnf install --nogpgcheck -y sssd-client
    - kinit stci@CERN.CH -k -t /stci.krb5/stci.keytab
    # KOJI_SCRATCH will be set for branches and empty for tags
    - koji build ${KOJI_SCRATCH} ${TARGET} ${BUILD_NAME}-artifacts/SRPMS/*.src.rpm
  tags:
    - docker_node
    - publish
  rules: !reference [.rules-manual, rules]


# publish_koji_* jobs can't be matrixed: GitLab does not interpolate variables
# in `needs:job` strings, so each consumer must reference its upstream by literal
# name. (The `rh` build matrix and the `prebuild`/`eos_apmon` matrices are fine
# because they have no `needs:` of their own.)
publish_koji_al8:
  extends: .publish_koji_template
  variables:
    TARGET: "eos8al"
    BUILD_NAME: "el-8"
  rules: !reference [.rules-schedules-and-tags-manual, rules]
  needs:
    - job: build_el8
      artifacts: true


publish_koji_al9:
  extends: .publish_koji_template
  variables:
    TARGET: "eos9al"
    BUILD_NAME: "el-9"
  needs:
    - job: build_el9
      artifacts: true


publish_koji_al10:
  extends: .publish_koji_template
  variables:
    TARGET: "eos10al"
    BUILD_NAME: "el-10"
  rules: !reference [.rules-schedules-and-tags-manual, rules]
  needs:
    - job: build_el10
      artifacts: true


publish_koji_rh-8:
  extends: .publish_koji_template
  variables:
    TARGET: "eos8el"
    BUILD_NAME: "rh-8"
  rules: !reference [.rules-schedules-and-tags-manual, rules]
  needs:
    - job: "rh: [8]"
      artifacts: true


publish_koji_rh-9:
  extends: .publish_koji_template
  variables:
    TARGET: "eos9el"
    BUILD_NAME: "rh-9"
  rules: !reference [.rules-schedules-and-tags-manual, rules]
  needs:
    - job: "rh: [9]"
      artifacts: true


publish_koji_rh-10:
  extends: .publish_koji_template
  variables:
    TARGET: "eos10el"
    BUILD_NAME: "rh-10"
  rules: !reference [.rules-schedules-and-tags-manual, rules]
  needs:
    - job: "rh: [10]"
      artifacts: true


#-------------------------------------------------------------------------------
# Notifications
#-------------------------------------------------------------------------------

email_notification:
  stage: publish
  variables:
    ENV: production
    TO_ADDRS: project-eos-commits@cern.ch,lxbatch-experts@cern.ch
  script:
    - dnf install -y git python pip
    - git clone https://token:$EOS_REPO_MAILSERVICE_TOKEN@gitlab.cern.ch/eos/eos-mailservices-code-samples.git
    - cd eos-mailservices-code-samples/Python/oauth2-samples; pip install --no-input -r requirements.txt
    - export EOS_VERSION=$CI_COMMIT_TAG
    - python -m oauth2_smtp
  needs:
    - job: publish_koji_al9
  rules: !reference [.rules-tags-only, rules]

#-------------------------------------------------------------------------------
# RPM artifacts publishing to storage-ci
#-------------------------------------------------------------------------------

rpm_commit_artifacts:
  stage: publish
  needs:
    - job: build_el8
      artifacts: true
      optional: true
    - job: build_el9
      artifacts: true
    - job: build_el10
      artifacts: true
      optional: true
    - job: build_el9_arm64
      artifacts: true
      optional: true
    - job: build_fedora_44
      artifacts: true
      optional: true
  script:
    - dnf install --nogpgcheck -y sudo sssd-client createrepo
    - if [[ -n "$CI_COMMIT_TAG" ]]; then echo "This only works for commits"; exit 0; else BUILD_TYPE="commit"; fi
    - sudo -u stci -H ./gitlab-ci/publish_rpm.sh ${CODENAME} ${BUILD_TYPE} /eos/project/s/storage-ci/www/eos
  tags:
    - docker_node
    - publish
  rules:
    - if: '$CI_COMMIT_TAG'
      when: never
    - when: manual
  allow_failure: true


rpm_testing_artifacts:
  stage: publish
  script:
    - dnf install --nogpgcheck -y sudo sssd-client createrepo
    - if [[ -n "$CI_COMMIT_TAG" ]]; then BUILD_TYPE="tag/testing"; else BUILD_TYPE="commit"; fi
    - sudo -u stci -H ./gitlab-ci/publish_rpm.sh ${CODENAME} ${BUILD_TYPE} /eos/project/s/storage-ci/www/eos
  tags:
    - docker_node
    - publish
  rules: !reference [.rules-master-and-tags, rules]
  retry: 1


rpm_stable_artifacts:
  stage: publish
  script:
    - dnf install --nogpgcheck -y sudo sssd-client createrepo
    - if [[ -n "$CI_COMMIT_TAG" ]]; then BUILD_TYPE="tag"; else echo "This only works for tags"; exit 0; fi
    - ./gitlab-ci/publish_rpm.sh ${CODENAME} ${BUILD_TYPE} /mnt/eos_repositories/eos
    - sudo -u stci -H ./gitlab-ci/store_stable_artifacts.sh ${CODENAME} /eos/project/s/storage-ci/www/eos ${CI_COMMIT_TAG}
    - echo ${CI_COMMIT_TAG} | sudo -u stci tee /eos/project/s/storage-ci/www/eos/${CODENAME}/tag/latest_version
  tags:
    - docker_node
    - publish
  rules: !reference [.rules-tags-manual, rules]
  dependencies: []


#-------------------------------------------------------------------------------
# Post-publish docker image push
#-------------------------------------------------------------------------------

.publish_dockerimage-template:
  stage: publish
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  variables:
    # eos-docker (redesigned layout): single minimal Dockerfile, parameterised
    DOCKERFILE: eos-docker/docker/Dockerfile.minimal
    DIST: el-9
    PACKAGES: ""
  script:
    - if [[ -n "$CI_COMMIT_TAG" ]]; then
        export REPOBRANCH="tag-testing";
        export DESTINATION="${IMAGE_REPO}:${CI_COMMIT_TAG}${OS_TAG}";
      else
        export REPOBRANCH="commit";
        export DESTINATION="${IMAGE_REPO}:${CI_COMMIT_SHORT_SHA}${OS_TAG}";
      fi
    - echo "{\"auths\":{\"$CI_REGISTRY\":{\"auth\":\"$(echo -n $CI_REGISTRY_USER:$CI_REGISTRY_PASSWORD | base64)\"}}}" > /kaniko/.docker/config.json
    - |
      set -- \
        --cache=false \
        --destination "$DESTINATION" \
        --dockerfile "$DOCKERFILE" \
        --context "$CI_PROJECT_DIR" \
        --compressed-caching=false \
        --use-new-run \
        --build-arg=EOS_CODENAME="${CODENAME}" \
        --build-arg=DIST="${DIST}" \
        --build-arg=REPOBRANCH="${REPOBRANCH}"
      [[ -n "$PACKAGES" ]] && set -- "$@" --build-arg=PACKAGES="${PACKAGES}"
      /kaniko/executor "$@"
  retry: 1


el9_publish_dockerimage_all:
  extends: .publish_dockerimage-template
  variables:
    IMAGE_REPO: "gitlab-registry.cern.ch/dss/eos/eos-all"
    DIST: el-9
  needs:
    - job: clone_docker
    - job: build_el9
  allow_failure: true
  rules: !reference [.rules-manual, rules]


el9_publish_dockerimage_fusex:
  extends: .publish_dockerimage-template
  variables:
    IMAGE_REPO: "gitlab-registry.cern.ch/dss/eos/eos-fusex"
    DIST: el-9
    # Restrict the package set to the fuse client only
    PACKAGES: "eos-fusex"
  needs:
    - job: clone_docker
    - job: build_el9
  allow_failure: true
  rules: !reference [.rules-manual, rules]
