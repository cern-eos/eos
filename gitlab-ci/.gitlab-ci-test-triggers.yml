# Whoever triggers this job, must have the rights to start a pipeline in CTA
trigger_cta_regression_tests:
  stage: test
  needs:
    - job: el9_docker_image
      artifacts: false
  variables:
    CTA_BRANCH: main
    PIPELINE_TYPE: REGR_AGAINST_CTA_VERSION
    # Forwarded to the CTA pipeline; value computed by the workflow rules in
    # the top-level .gitlab-ci.yml. Declared here so it is passed downstream
    # despite forward.pipeline_variables being false.
    CUSTOM_EOS_IMAGE_TAG: $EOS_IMAGE_TAG
  trigger:
    project: cta/CTA
    branch: $CTA_BRANCH
    strategy: mirror
    forward:
      pipeline_variables: false # Prevent accidentally overwriting CTA pipeline variables
  rules:
    # Auto-run on schedules and tags, manual otherwise
    - !reference [.rules-schedules-and-tags, rules]
    - !reference [.rules-manual, rules]
